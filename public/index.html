<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Florería</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="inventory.css">
</head>

<body>

  <header>
    <div>
      <div class="logo">🌸 Florería — Agenda de Pedidos</div>
      <div class="sub">Sistema de gestión de pedidos</div>
    </div>
  </header>

  <nav>
    <button class="active" onclick="showSection('pedidos')">📋 Pedidos</button>
    <button onclick="showSection('nuevo')">➕ Nuevo Pedido</button>
    <button onclick="showSection('menu')">🌹 Menú / Ramos</button>
    <button onclick="showSection('inventario')">📦 Inventario</button>
  </nav>

  <main>

      <!-- PEDIDOS -->
      <div id="sec-pedidos" class="section active">

          <h2>Todos los pedidos</h2>

          <div class="stats" id="stats-bar"></div>

          <div class="filter-bar">
              <input type="text" id="buscar" placeholder="Buscar por nombre o teléfono..." oninput="renderPedidos()">

              <select id="filtro-estado" onchange="renderPedidos()">
                  <option value="">Todos los estados</option>
                  <option>Pendiente</option>
                  <option>Entregado</option>
                  <option>Cancelado</option>
              </select>

              <select id="filtro-tipo" onchange="renderPedidos()">
                  <option value="">Todos los tipos</option>
                  <option>Domicilio</option>
                  <option>Local</option>
              </select>
          </div>

          <div class="card" style="padding:0; overflow:hidden;">
              <div class="table-wrap">

                  <table>
                      <thead>
                          <tr>
                              <th>#</th>
                              <th>Cliente</th>
                              <th>Teléfono</th>
                              <th>Ramo</th>
                              <th>Tipo</th>
                              <th>Fecha pedido</th>
                              <th>Estado</th>
                              <th>Pago</th>
                              <th>Acciones</th>
                          </tr>
                      </thead>

                      <tbody id="tabla-pedidos"></tbody>
                  </table>

              </div>
          </div>

      </div>

      <!-- NUEVO PEDIDO -->
      <div id="sec-nuevo" class="section">

          <h2 id="form-titulo">Nuevo Pedido</h2>

          <div id="alert-form"></div>

          <div class="card">

              <div class="form-grid">

                  <div class="form-group">
                      <label>Nombre del cliente *</label>
                      <input type="text" id="f-nombre">
                  </div>

                  <div class="form-group">
                      <label>Teléfono del cliente *</label>
                      <input type="tel" id="f-telefono">
                  </div>

                  <div class="form-group">
                      <label>Ramo / Producto *</label>
                      <select id="f-ramo">
                          <option value="">Seleccionar...</option>
                      </select>
                  </div>

                  <div class="form-group">
                      <label>Método de pago</label>
                      <select id="f-pago">
                          <option value="">Sin especificar</option>
                          <option>Efectivo</option>
                          <option>Tarjeta</option>
                          <option>Transferencia</option>
                      </select>
                  </div>

                  <div class="form-group full">
                      <label>Notas adicionales</label>
                      <textarea id="f-notas"></textarea>
                  </div>

              </div>

              <hr class="divider">

              <label style="margin-bottom:.5rem;display:block">
                  Tipo de pedido *
              </label>

              <div class="type-tabs">
                  <button class="type-tab active" onclick="setTipo('Domicilio',this)">
                      🚚 Envío a domicilio
                  </button>

                  <button class="type-tab" onclick="setTipo('Local',this)">
                      🏪 Recolección en local
                  </button>
              </div>

              <!-- DOMICILIO -->
              <div class="form-grid" id="bloque-domicilio">

                  <div class="form-group full">
                      <label>Dirección *</label>
                      <input type="text" id="f-direccion">
                  </div>

                  <div class="form-group">
                      <label>Destinatario *</label>
                      <input type="text" id="f-dest-nombre">
                  </div>

                  <div class="form-group">
                      <label>Teléfono destinatario *</label>
                      <input type="tel" id="f-dest-tel">
                  </div>

                  <div class="form-group">
                      <label>Fecha entrega *</label>
                      <input type="date" id="f-fecha-entrega">
                  </div>

                  <div class="form-group">
                      <label>Horario</label>
                      <select id="f-horario-entrega">
                          <option value="">Seleccionar horario</option>
                          <option>9:00 - 11:00</option>
                          <option>11:00 - 13:00</option>
                          <option>13:00 - 15:00</option>
                          <option>15:00 - 17:00</option>
                      </select>
                  </div>

              </div>

              <!-- LOCAL -->
              <div class="form-grid" id="bloque-local" style="display:none;">

                  <div class="form-group">
                      <label>Nombre de quien recoge *</label>
                      <input type="text" id="f-rec-nombre">
                  </div>

                  <div class="form-group">
                      <label>Teléfono *</label>
                      <input type="tel" id="f-rec-tel">
                  </div>

              </div>

              <hr class="divider">

              <div style="display:flex; gap:.75rem; justify-content:flex-end;">

                  <button class="btn" style="border:1px solid var(--border-m); background:transparent;" onclick="resetForm()">
                      Cancelar
                  </button>

                  <button class="btn btn-primary" onclick="guardarPedido()">
                      💾 Guardar pedido
                  </button>

              </div>

          </div>

      </div>

      <!-- MENU -->
      <div id="sec-menu" class="section">

          <h2>Menú de Ramos</h2>

          <div class="card" style="max-width:500px;">

              <div class="form-grid" style="grid-template-columns:1fr auto; align-items:end;">

                  <div class="form-group">
                      <label>Nombre del ramo *</label>
                      <input type="text" id="m-nombre">
                  </div>

                  <button class="btn btn-primary" onclick="agregarRamo()">
                      + Agregar
                  </button>

              </div>

              <hr class="divider">

              <div id="lista-ramos"></div>

          </div>

      </div>

      <!-- INVENTARIO -->
      <div id="sec-inventario" class="section">

          <div class="stats">
              <div class="stat-box">
                  <h2>Total Productos</h2>
                  <p id="totalProductos">0</p>
              </div>

              <div class="stat-box">
                  <h2>Stock Bajo</h2>
                  <p id="stockBajo">0</p>
              </div>

              <div class="stat-box">
                  <h2>Total Unidades</h2>
                  <p id="totalUnidades">0</p>
              </div>
          </div>

          <div class="card">
              <div class="top-bar">
                  <input type="text" id="nombre" placeholder="Nombre del producto">

                  <select id="categoria">
                      <option value="Flores">Flores</option>
                      <option value="Papelería">Papelería</option>
                      <option value="Decoración">Decoración</option>
                      <option value="Accesorios">Accesorios</option>
                  </select>

                  <input type="number" id="stock" placeholder="Stock">

                  <input type="number" id="minimo" placeholder="Stock mínimo">

                  <button onclick="addFlower()">Agregar</button>
              </div>
          </div>

          <div class="card">
              <table>
                  <thead>
                      <tr>
                          <th>Producto</th>
                          <th>Categoría</th>
                          <th>Stock</th>
                          <th>Stock mínimo</th>
                          <th>Estado</th>
                          <th>Acciones</th>
                      </tr>
                  </thead>

                  <tbody id="flowerTable"></tbody>
              </table>
          </div>

      </div>

      <script src="inventory.js"> </script>

      </div>

  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">

    <div class="modal">

      <h3>Editar pedido</h3>

      <div id="modal-body"></div>

      <div class="modal-footer">

        <button class="btn" onclick="cerrarModal()">
          Cancelar
        </button>

        <button class="btn btn-primary" onclick="guardarEdicion()">
          Guardar cambios
        </button>

      </div>

    </div>

  </div>

  <script src="Database.js"></script>
  <script src="App.js"></script>

</body>

</html>
